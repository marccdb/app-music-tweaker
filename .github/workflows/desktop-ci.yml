name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  quality:
    name: License + Tests + Builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: License gate
        run: npm run licenses:check

      - name: Generate third-party notices
        run: npm run licenses:notices

      - name: Verify notices committed
        run: git diff --exit-code -- THIRD_PARTY_NOTICES.md

      - name: Unit tests
        run: npm run test

      - name: Web build
        run: npm run build

      - name: Desktop build
        run: npm run build:desktop

  long-file-memory:
    name: Long-file memory smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Long-file memory behavior check
        run: npm run qa:memory-long-file

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    defaults:
      run:
        working-directory: app
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundles
        run: npm run build:desktop

      - name: Package smoke build
        run: npm run qa:package-smoke
        env:
          PACKAGE_SMOKE_TARGET: ${{ matrix.target }}
